version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///./voice_agent.db
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./templates:/app/templates
      - app_data:/app/data
    env_file:
      - .env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - voice_agent_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - voice_agent_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_data:
  redis_data:

networks:
  voice_agent_network:
    driver: bridge
